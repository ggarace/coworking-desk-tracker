<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coworking Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: -apple-system;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.card {
  background: #1e293b;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
}

.big { font-size: 34px; font-weight: bold; }
.label { font-size: 12px; opacity: 0.7; }

input, button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  margin-top: 8px;
}

input { background: #334155; color: white; }
button { background: #22c55e; color: black; font-weight: bold; }

.progress {
  height: 8px;
  background: #334155;
  border-radius: 10px;
  margin-top: 10px;
}

.bar {
  height: 8px;
  border-radius: 10px;
  background: #22c55e;
}

.warn { color: #f87171; }
.ok { color: #4ade80; }
</style>
</head>

<body>

<h2>⏱ Coworking</h2>

<div class="card">
  <div class="label">Remaining</div>
  <div id="remaining" class="big">18</div>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>

  <div class="label">Used</div>
  <div id="total">0 hrs</div>

  <div id="status"></div>
</div>

<div class="card">
  <div class="label">📅 Smart Plan</div>
  <div id="plan"></div>
  <div id="daily"></div>
</div>

<div class="card">
  <div class="label">Log Session</div>
  <input type="date" id="date">

  <div class="label">Time In</div>
  <input type="time" id="timeIn">

  <div class="label">Time Out</div>
  <input type="time" id="timeOut">

  <button onclick="add()">Add Session</button>
</div>

<div class="card">
  <div class="label">📝 Recent Logs</div>
  <div id="logs"></div>
</div>

<script>
const LIMIT = 18;
let entries = JSON.parse(localStorage.getItem("entries")) || [];

function getCycleStart(d) {
  let date = new Date(d);
  let start = new Date(date.getFullYear(), date.getMonth(), 29);
  if (date.getDate() < 29) {
    start = new Date(date.getFullYear(), date.getMonth() - 1, 29);
  }
  return start;
}

function getCycleEnd(start) {
  let end = new Date(start);
  end.setMonth(end.getMonth() + 1);
  return end;
}

function getCurrentEntries() {
  const start = getCycleStart(new Date());
  const end = getCycleEnd(start);

  return entries.filter(e => {
    const d = new Date(e.date);
    return d >= start && d < end;
  });
}

function computeHours(timeIn, timeOut) {
  const [h1, m1] = timeIn.split(":").map(Number);
  const [h2, m2] = timeOut.split(":").map(Number);

  let start = h1 + m1 / 60;
  let end = h2 + m2 / 60;

  if (end < start) end += 24; // overnight safety

  return end - start;
}

function render() {
  const current = getCurrentEntries();

  let total = current.reduce((s, e) => s + e.hours, 0);
  let remaining = LIMIT - total;

  document.getElementById("total").innerText = total.toFixed(2) + " hrs";
  document.getElementById("remaining").innerText = remaining.toFixed(2);

  document.getElementById("bar").style.width =
    ((total / LIMIT) * 100) + "%";

  let status = "";
  if (remaining <= 0) status = "<span class='warn'>Over limit</span>";
  else if (remaining <= 3) status = "<span class='warn'>Almost out</span>";
  else status = "<span class='ok'>On track</span>";

  document.getElementById("status").innerHTML = status;

  // Smart plan
  const start = getCycleStart(new Date());
  const end = getCycleEnd(start);

  const daysLeft = (end - new Date()) / (1000*60*60*24);
  const weeksLeft = daysLeft / 7;

  let weekly = weeksLeft > 0 ? remaining / weeksLeft : 0;
  let daily = daysLeft > 0 ? remaining / daysLeft : 0;

  document.getElementById("plan").innerText =
    weekly.toFixed(2) + " hrs/week";

  document.getElementById("daily").innerText =
    "≈ " + daily.toFixed(2) + " hrs/day";

  // Logs
  let logHTML = "";
  current.slice(-5).reverse().forEach(e => {
    logHTML += `<div>${e.date} (${e.timeIn} - ${e.timeOut}) = ${e.hours.toFixed(2)}h</div>`;
  });

  document.getElementById("logs").innerHTML = logHTML;

  localStorage.setItem("entries", JSON.stringify(entries));
}

function add() {
  const date = document.getElementById("date").value;
  const timeIn = document.getElementById("timeIn").value;
  const timeOut = document.getElementById("timeOut").value;

  if (!date || !timeIn || !timeOut) {
    alert("Complete all fields");
    return;
  }

  const hours = computeHours(timeIn, timeOut);

  entries.push({ date, timeIn, timeOut, hours });
  render();
}

// gentle reminder
setTimeout(() => {
  if (confirm("Did you use coworking today? Log it now.")) {
    window.scrollTo(0, document.body.scrollHeight);
  }
}, 2000);

render();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
